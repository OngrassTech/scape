# Keep Gradle comfortably inside typical 16 GB Windows machines so the JVM
# doesn't run out of native address space during release builds.
org.gradle.jvmargs=-Xmx4G -XX:MaxMetaspaceSize=1G -XX:ReservedCodeCacheSize=256m -XX:+HeapDumpOnOutOfMemoryError -Dfile.encoding=UTF-8
org.gradle.parallel=false
org.gradle.workers.max=2
kotlin.daemon.jvmargs=-Xmx1536m
android.useAndroidX=true
